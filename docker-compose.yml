services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF on so the puller's cursor / state survives container restart.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  puller:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["python", "-m", "app.puller"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - exports:/data/exports

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - exports:/data/exports

volumes:
  redisdata:
  exports:
