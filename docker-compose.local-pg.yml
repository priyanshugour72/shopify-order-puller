# Layered on top of docker-compose.yml when the env wants a bundled Postgres
# container (POSTGRES_HOST=postgres). For RDS, do NOT layer this file in —
# the Makefile picks the right combination automatically.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  puller:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
